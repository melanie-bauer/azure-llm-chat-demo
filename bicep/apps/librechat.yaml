# LibreChat configuration. Loaded only when deployLibreChat=true.
# LiteLLM customer id is X-LiteLLM-User-Email (see litellm_config.yaml user_header_name).
# X-LiteLLM-User-Id uses Entra OID ({{LIBRECHAT_USER_OPENIDID}}) for correlation in spend tags only;
# Open WebUI forwards its internal user id in the same header, so ids differ across apps unless you use email as canonical.

version: 1.3.5

cache: true

interface:
  privacyPolicy:
    externalUrl: https://example.com/privacy
  termsOfService:
    externalUrl: https://example.com/terms

registration:
  socialLogins:
    - openid

balance:
  enabled: false

transactions:
  enabled: true

endpoints:
  custom:
    - name: LiteLLM
      apiKey: ${LITELLM_API_KEY}
      baseURL: ${LITELLM_BASE_URL}
      models:
        default:
          - gpt-4.1-mini
          - gpt-4.1
        fetch: true
      headers:
        X-LiteLLM-User-Id: '{{LIBRECHAT_USER_OPENIDID}}'
        X-LiteLLM-User-Email: '{{LIBRECHAT_USER_EMAIL}}'
        X-LiteLLM-User-Name: '{{LIBRECHAT_USER_NAME}}'
        X-LiteLLM-Source-App: 'librechat'
      titleConvo: true
      titleMethod: completion
      titleModel: gpt-4.1-mini
      modelDisplayLabel: LiteLLM
      summarize: false
