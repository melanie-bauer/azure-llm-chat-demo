# LibreChat configuration. Loaded only when deployLibreChat=true.
# X-LiteLLM-User-Id uses {{LIBRECHAT_USER_OPENIDID}} (Entra object id / stable OIDC id),
# not LIBRECHAT_USER_ID (local DB id), so it can match Open WebUI's OAUTH_SUB_CLAIM=oid.

version: 1.3.5

cache: true

interface:
  privacyPolicy:
    externalUrl: https://example.com/privacy
  termsOfService:
    externalUrl: https://example.com/terms

registration:
  socialLogins:
    - openid

balance:
  enabled: false

transactions:
  enabled: true

endpoints:
  custom:
    - name: LiteLLM
      apiKey: ${LITELLM_API_KEY}
      baseURL: ${LITELLM_BASE_URL}
      models:
        default:
          - gpt-4.1-mini
          - gpt-4.1
        fetch: true
      headers:
        X-LiteLLM-User-Id: '{{LIBRECHAT_USER_OPENIDID}}'
        X-LiteLLM-User-Email: '{{LIBRECHAT_USER_EMAIL}}'
        X-LiteLLM-User-Name: '{{LIBRECHAT_USER_NAME}}'
        X-LiteLLM-Source-App: 'librechat'
      titleConvo: true
      titleMethod: completion
      titleModel: gpt-4.1-mini
      modelDisplayLabel: LiteLLM
      summarize: false
