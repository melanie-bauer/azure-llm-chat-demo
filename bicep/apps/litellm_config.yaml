litellm_settings:
  master_key: os.environ/LITELLM_MASTER_KEY
  database_url: os.environ/DATABASE_URL

  drop_params: true
  json_logs: true

  store_model_in_db: true
  store_prompts_in_spend_logs: true

  default_key_generate_params:
    max_budget: 100.0
    budget_duration: 30d

  max_end_user_budget_id: "demo-budget"

  success_callback:
    - prometheus

  extra_spend_tag_headers:
    - "X-LiteLLM-User-Id"
    - "X-LiteLLM-User-Email"
    - "X-LiteLLM-User-Name"
    - "X-LiteLLM-Source-App"

general_settings:
  ui_access_mode: admin_only

  # Frontends send X-LiteLLM-* headers; email is the customer dimension for spend and budgets.
  user_header_mappings:
    - header_name: "X-LiteLLM-User-Email"
      litellm_user_role: customer
    - header_name: "X-LiteLLM-User-Id"
      litellm_user_role: internal_user

  alerting:
    - slack
  alerting_threshold: 300

router_settings:
  routing_strategy: simple-shuffle
  num_retries: 2
  timeout: 60
  enable_pre_call_checks: true

model_list:
  - model_name: gpt-4.1-mini
    litellm_params:
      model: azure/gpt-4.1-mini
      api_base: os.environ/AZURE_API_BASE
      api_key: os.environ/AZURE_API_KEY
      api_version: os.environ/AZURE_API_VERSION

  - model_name: gpt-4.1
    litellm_params:
      model: azure/gpt-4.1
      api_base: os.environ/AZURE_API_BASE
      api_key: os.environ/AZURE_API_KEY
      api_version: os.environ/AZURE_API_VERSION
