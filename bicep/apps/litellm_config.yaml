# LiteLLM proxy configuration.
# Schema reference: https://docs.litellm.ai/docs/proxy/config_settings

litellm_settings:
  master_key: os.environ/LITELLM_MASTER_KEY
  database_url: os.environ/DATABASE_URL

  drop_params: true
  json_logs: true

  store_model_in_db: true
  store_prompts_in_spend_logs: false

  default_key_generate_params:
    max_budget: 100.0
    budget_duration: 30d

  success_callback:
    - prometheus

  # Logged as metadata; canonical end-user id is general_settings.user_header_name
  extra_spend_tag_headers:
    - x-litellm-user-email
    - x-litellm-user-name
    - x-litellm-source-app

general_settings:
  ui_access_mode: admin_only
  # Single header both Open WebUI and LibreChat send (see openWebUI.bicep + librechat.yaml)
  user_header_name: X-LiteLLM-User-Id
  alerting:
    - slack
  alerting_threshold: 300

router_settings:
  routing_strategy: simple-shuffle
  num_retries: 2
  timeout: 60
  enable_pre_call_checks: true

model_list:
  - model_name: gpt-4.1-mini
    litellm_params:
      model: azure/gpt-4.1-mini
      api_base: os.environ/AZURE_API_BASE
      api_key: os.environ/AZURE_API_KEY
      api_version: os.environ/AZURE_API_VERSION

  - model_name: gpt-4.1
    litellm_params:
      model: azure/gpt-4.1
      api_base: os.environ/AZURE_API_BASE
      api_key: os.environ/AZURE_API_KEY
      api_version: os.environ/AZURE_API_VERSION
