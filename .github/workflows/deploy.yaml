name: Deploy Bicep to Azure (dev)

on:
  push:
    branches:
      - main
    paths:
      - 'bicep/apps/**'
      - '.github/workflows/deploy.yaml'
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

jobs:
  deploy-bicep:
    runs-on: ubuntu-latest
    environment: dev

    env:
      RG_NAME:    ${{ vars.RG_NAME }}
      LOCATION:   ${{ vars.LOCATION }}
      BICEP_FILE: ./bicep/apps/main.bicep
      PARAM_FILE: ./bicep/apps/dev.parameters.json

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Login to Azure
        uses: azure/login@v2
        with:
          client-id:       ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id:       ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Ensure resource group
        uses: azure/cli@v2
        with:
          inlineScript: |
            az group create --name "$RG_NAME" --location "$LOCATION" --output none

      - name: Bicep build / lint
        uses: azure/cli@v2
        with:
          inlineScript: az bicep build --file "$BICEP_FILE"

      - name: What-if
        uses: azure/cli@v2
        with:
          inlineScript: |
            az deployment group what-if \
              --resource-group "$RG_NAME" \
              --template-file "$BICEP_FILE" \
              --parameters @"$PARAM_FILE" \
              --parameters \
                adminPrincipalId="${{ secrets.ADMIN_OBJECT_ID }}" \
                postgresAdminLogin="${{ secrets.POSTGRES_ADMIN_LOGIN }}" \
                postgresAdminPassword="${{ secrets.POSTGRES_ADMIN_PASSWORD }}" \
                litellmMasterKey="${{ secrets.LITELLM_MASTER_KEY }}" \
                litellmServiceKey="${{ secrets.LITELLM_SERVICE_KEY }}" \
                openWebUISecretKey="${{ secrets.OPEN_WEBUI_SECRET_KEY }}" \
                openWebUiUrl="${{ vars.OPEN_WEBUI_URL }}" \
                libreChatUrl="${{ vars.LIBRECHAT_URL }}" \
                oidcProviderUrl="${{ secrets.OIDC_PROVIDER_URL }}" \
                oidcOpenWebUIClientId="${{ secrets.OIDC_OPENWEBUI_CLIENT_ID }}" \
                oidcOpenWebUIClientSecret="${{ secrets.OIDC_OPENWEBUI_CLIENT_SECRET }}" \
                oidcLibreChatClientId="${{ secrets.OIDC_LIBRECHAT_CLIENT_ID }}" \
                oidcLibreChatClientSecret="${{ secrets.OIDC_LIBRECHAT_CLIENT_SECRET }}" \
                librechatJwtSecret="${{ secrets.LIBRECHAT_JWT_SECRET }}" \
                librechatJwtRefreshSecret="${{ secrets.LIBRECHAT_JWT_REFRESH_SECRET }}" \
                librechatOidcSessionSecret="${{ secrets.LIBRECHAT_OIDC_SESSION_SECRET }}" \
                azureOpenAIKeyOverride="${{ secrets.AZURE_OPENAI_KEY_OVERRIDE }}"

      - name: Deploy
        uses: azure/cli@v2
        with:
          inlineScript: |
            az deployment group create \
              --resource-group "$RG_NAME" \
              --template-file "$BICEP_FILE" \
              --parameters @"$PARAM_FILE" \
              --parameters \
                adminPrincipalId="${{ secrets.ADMIN_OBJECT_ID }}" \
                postgresAdminLogin="${{ secrets.POSTGRES_ADMIN_LOGIN }}" \
                postgresAdminPassword="${{ secrets.POSTGRES_ADMIN_PASSWORD }}" \
                litellmMasterKey="${{ secrets.LITELLM_MASTER_KEY }}" \
                litellmServiceKey="${{ secrets.LITELLM_SERVICE_KEY }}" \
                openWebUISecretKey="${{ secrets.OPEN_WEBUI_SECRET_KEY }}" \
                openWebUiUrl="${{ vars.OPEN_WEBUI_URL }}" \
                libreChatUrl="${{ vars.LIBRECHAT_URL }}" \
                oidcProviderUrl="${{ secrets.OIDC_PROVIDER_URL }}" \
                oidcOpenWebUIClientId="${{ secrets.OIDC_OPENWEBUI_CLIENT_ID }}" \
                oidcOpenWebUIClientSecret="${{ secrets.OIDC_OPENWEBUI_CLIENT_SECRET }}" \
                oidcLibreChatClientId="${{ secrets.OIDC_LIBRECHAT_CLIENT_ID }}" \
                oidcLibreChatClientSecret="${{ secrets.OIDC_LIBRECHAT_CLIENT_SECRET }}" \
                librechatJwtSecret="${{ secrets.LIBRECHAT_JWT_SECRET }}" \
                librechatJwtRefreshSecret="${{ secrets.LIBRECHAT_JWT_REFRESH_SECRET }}" \
                librechatOidcSessionSecret="${{ secrets.LIBRECHAT_OIDC_SESSION_SECRET }}" \
                azureOpenAIKeyOverride="${{ secrets.AZURE_OPENAI_KEY_OVERRIDE }}"
